<!DOCTYPE html>
<html lang="id">
<head>

                <input type="text" maxlength="1" value="2" class="w-12 h-14 text-center text-2xl font-semibold border border-gray-300 focus:border-brand focus:outline-none bg-white">

            <a href="account.html" class="block w-full bg-brand text-white py-3 text-center text-sm hover:bg-gray-700">Verifikasi</a>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-600 mb-1">Tidak menerima kode?</p>
                <span class="text-sm text-gray-400">Kirim ulang dalam <strong>45</strong> detik</span>
