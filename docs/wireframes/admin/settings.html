<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Arnes Dive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: '#333333' } } } }</script>
</head>
<body class="font-sans text-sm bg-gray-100">
    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-brand text-white transform -translate-x-full lg:translate-x-0 z-30">
            <div class="p-6 border-b border-gray-700"><a href="index.html" class="text-xl font-bold">ARNES DIVE</a><p class="text-xs text-gray-400 mt-1">Admin Panel</p></div>
            <nav class="p-4 space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>📊</span> Dashboard</a>
                <a href="products.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>📦</span> Products</a>
                <a href="orders.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🛒</span> Orders</a>
                <a href="customers.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>👥</span> Customers</a>
                <a href="reports.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>📈</span> Reports</a>
                <div class="pt-4 border-t border-gray-700 mt-4"><a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-gray-700 rounded font-medium"><span>⚙️</span> Settings</a><a href="../login.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🚪</span> Logout</a></div>
            </nav>
        </aside>
        <div class="flex-1 lg:ml-64">
            <header class="bg-white border-b px-4 py-3 flex items-center justify-between">
                <button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">☰</button>
                <h1 class="text-lg font-semibold">Settings</h1>
            </header>
            <main class="p-6 max-w-4xl">
                <form class="space-y-6">
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Store Information</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block text-xs text-gray-600 mb-1">Store Name</label><input type="text" value="Arnes Dive Shop" class="w-full px-3 py-2 border"></div>
                            <div><label class="block text-xs text-gray-600 mb-1">Store Email</label><input type="email" value="support@arnesdive.com" class="w-full px-3 py-2 border"></div>
                            <div><label class="block text-xs text-gray-600 mb-1">Phone</label><input type="text" value="+62 812-3456-7890" class="w-full px-3 py-2 border"></div>
                            <div><label class="block text-xs text-gray-600 mb-1">Address</label><input type="text" value="Jakarta, Indonesia" class="w-full px-3 py-2 border"></div>
                        </div>
                    </div>
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Payment Methods</h2>
                        <div class="space-y-2">
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> Bank Transfer (VA)<span class="text-xs text-gray-600">BCA, BNI, BRI, Mandiri</span></label>
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> Credit/Debit Card<span class="text-xs text-gray-600">Visa, Mastercard</span></label>
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> E-Wallet<span class="text-xs text-gray-600">GoPay, OVO, DANA</span></label>
                        </div>
                    </div>
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Shipping Methods</h2>
                        <div class="space-y-2">
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> JNE<span class="text-xs text-gray-600">Reguler, YES</span></label>
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> SiCepat<span class="text-xs text-gray-600">REG, BEST</span></label>
                            <label class="flex items-center justify-between p-3 border"><input type="checkbox" checked class="mr-3"> J&T Express</label>
                        </div>
                    </div>
                    <button type="submit" class="bg-brand text-white px-6 py-2 text-xs uppercase">Save Settings</button>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
