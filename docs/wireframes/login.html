<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Arnes Dive Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; font-size: 14px; line-height: 1.5; background: #f9f9f9; }
        
        /* Wireframe styles */
        .wireframe-box {
            background: #f0f0f0;
            border: 2px dashed #999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 12px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }
        
        /* Top Bar */
        .top-bar { background: #e0e0e0; padding: 8px; text-align: center; font-size: 12px; }
        
        /* Navigation */
        .nav { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ddd;
        }
        .nav-logo { font-size: 24px; font-weight: bold; color: #333; text-decoration: none; }
        
        /* Auth Container */
        .auth-container { 
            max-width: 480px; 
            margin: 48px auto; 
            background: white; 
            padding: 40px;
            border: 1px solid #ddd;
        }
        
        .auth-title { font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .auth-subtitle { text-align: center; color: #666; margin-bottom: 32px; }
        
        /* Tabs */
        .auth-tabs { display: flex; margin-bottom: 32px; border-bottom: 1px solid #ddd; }
        .auth-tab { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            text-decoration: none;
            color: #666;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .auth-tab.active { 
            color: #333; 
            font-weight: 600;
            border-bottom-color: #333;
        }
        
        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-label { 
            display: block; 
            font-size: 12px; 
            color: #666; 
            margin-bottom: 6px;
        }
        .form-label.required::after { content: " *"; color: #ff4444; }
        .form-input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: #333; }
        
        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .form-checkbox input { margin: 0; }
        .form-link { color: #333; text-decoration: none; font-size: 13px; }
        .form-link:hover { text-decoration: underline; }
        
        /* Buttons */
        .btn-primary { 
            display: block;
            width: 100%;
            padding: 14px; 
            background: #333; 
            color: white; 
            border: none;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .btn-primary:hover { background: #444; }
        
        .btn-google { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px; 
            background: white; 
            color: #333; 
            border: 1px solid #ddd;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        
        .divider { 
            display: flex; 
            align-items: center; 
            margin: 24px 0; 
            color: #999; 
            font-size: 12px;
        }
        .divider::before, .divider::after { 
            content: ""; 
            flex: 1; 
            height: 1px; 
            background: #ddd; 
        }
        .divider span { padding: 0 16px; }
        
        .auth-footer { text-align: center; font-size: 13px; color: #666; margin-top: 24px; }
        .auth-footer a { color: #333; text-decoration: none; font-weight: 500; }
        
        /* Footer */
        .footer { 
            text-align: center; 
            padding: 24px 16px; 
            font-size: 12px; 
            color: #666;
            margin-top: 48px;
        }
        .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 8px; }
        .footer-links a { color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <!-- Top Announcement Bar -->
    <div class="top-bar">
        Gratis Ongkir untuk pembelian di atas Rp 500.000
    </div>

    <!-- Navigation -->
    <nav class="nav">
        <a href="homepage.html" class="nav-logo">ARNES DIVE</a>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <h1 class="auth-title">Selamat Datang</h1>
        <p class="auth-subtitle">Masuk ke akun Anda atau buat akun baru</p>
        
        <!-- Tabs -->
        <div class="auth-tabs">
            <a href="#" class="auth-tab active">Masuk</a>
            <a href="register.html" class="auth-tab">Daftar</a>
        </div>

        <!-- Login Form -->
        <form>
            <div class="form-group">
                <label class="form-label required">Email</label>
                <input type="email" class="form-input" placeholder="email@contoh.com">
            </div>
            
            <div class="form-group">
                <label class="form-label required">Kata Sandi</label>
                <input type="password" class="form-input" placeholder="••••••••">
            </div>
            
            <div class="form-row">
                <label class="form-checkbox">
                    <input type="checkbox"> Ingat saya
                </label>
                <a href="#" class="form-link">Lupa kata sandi?</a>
            </div>
            
            <button type="submit" class="btn-primary">Masuk</button>
            
            <button type="button" class="btn-google">
                <span>G</span> Lanjutkan dengan Google
            </button>
        </form>
        
        <div class="divider"><span>atau</span></div>
        
        <p class="auth-footer">
            Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="faq.html">Bantuan</a>
            <a href="faq.html">Privasi</a>
            <a href="faq.html">Syarat</a>
        </div>
        <div>© 2024 Arnes Dive Shop. All rights reserved.</div>
    </footer>

</body>
</html>
