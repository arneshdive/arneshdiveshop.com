<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Admin Arnes Dive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: '#333333' } } } }</script>
</head>
<body class="font-sans text-sm bg-gray-100">
    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-brand text-white transform -translate-x-full lg:translate-x-0 z-30">
            <div class="p-6 border-b border-gray-700">
                <a href="index.html" class="text-xl font-bold">ARNES DIVE</a>
                <p class="text-xs text-gray-400 mt-1">Admin Panel</p>
            </div>
            <nav class="p-4 space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>📊</span> Dashboard</a>
                <a href="products.html" class="flex items-center gap-3 px-4 py-3 bg-gray-700 rounded font-medium"><span>📦</span> Products</a>
                <a href="orders.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🛒</span> Orders</a>
                <a href="customers.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>👥</span> Customers</a>
                <div class="pt-4 border-t border-gray-700 mt-4">
                    <a href="settings.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>⚙️</span> Settings</a>
                    <a href="../login.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🚪</span> Logout</a>
                </div>
            </nav>
        </aside>
        <div class="flex-1 lg:ml-64">
            <header class="bg-white border-b px-4 py-3 flex items-center justify-between">
                <button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">☰</button>
                <h1 class="text-lg font-semibold">Add New Product</h1>
                <div class="flex gap-3">
                    <a href="products.html" class="border px-4 py-2 text-xs uppercase">Cancel</a>
                    <button class="bg-brand text-white px-4 py-2 text-xs uppercase">Save</button>
                </div>
            </header>
            <main class="p-6 max-w-4xl">
                <form class="space-y-6">
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Basic Information</h2>
                        <div class="space-y-4">
                            <div><label class="block text-xs text-gray-600 mb-1">Product Name *</label><input type="text" class="w-full px-3 py-2 border"></div>
                            <div><label class="block text-xs text-gray-600 mb-1">Description</label><textarea rows="4" class="w-full px-3 py-2 border"></textarea></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs text-gray-600 mb-1">Category *</label><select class="w-full px-3 py-2 border bg-white"><option>Masker</option><option>Fin</option><option>Wetsuit</option></select></div>
                                <div><label class="block text-xs text-gray-600 mb-1">Brand</label><select class="w-full px-3 py-2 border bg-white"><option>Mares</option><option>Cressi</option><option>Beuchat</option></select></div>
                            </div>
                            <div><label class="block text-xs text-gray-600 mb-1">Diving Type</label>
                                <div class="flex gap-4"><label class="flex items-center gap-2"><input type="checkbox"> Freediving</label><label class="flex items-center gap-2"><input type="checkbox"> Scuba</label></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Variants</h2>
                        <div class="border p-4 mb-4">
                            <div class="grid grid-cols-3 gap-4 mb-4">
                                <div><label class="block text-xs text-gray-600 mb-1">SKU *</label><input type="text" class="w-full px-3 py-2 border"></div>
                                <div><label class="block text-xs text-gray-600 mb-1">Color</label><input type="text" class="w-full px-3 py-2 border"></div>
                                <div><label class="block text-xs text-gray-600 mb-1">Size</label><input type="text" class="w-full px-3 py-2 border"></div>
                            </div>
                            <div class="grid grid-cols-3 gap-4">
                                <div><label class="block text-xs text-gray-600 mb-1">Price *</label><input type="number" class="w-full px-3 py-2 border"></div>
                                <div><label class="block text-xs text-gray-600 mb-1">Sale Price</label><input type="number" class="w-full px-3 py-2 border"></div>
                                <div><label class="block text-xs text-gray-600 mb-1">Stock *</label><input type="number" class="w-full px-3 py-2 border"></div>
                            </div>
                        </div>
                        <button type="button" class="text-xs text-brand">+ Add Another Variant</button>
                    </div>
                    <div class="bg-white border p-6">
                        <h2 class="font-semibold mb-4">Images</h2>
                        <div class="border-2 border-dashed border-gray-300 p-8 text-center text-gray-500 text-xs">Drop images or click to upload</div>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
