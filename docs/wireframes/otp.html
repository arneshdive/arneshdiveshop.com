<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi - Arnes Dive Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, sans-serif; 
            font-size: 14px; 
            line-height: 1.5; 
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 48px;
        }
        
        .otp-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .otp-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 13px;
        }
        .otp-subtitle span { color: #333; font-weight: 500; }
        
        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 1px solid #ddd;
            background: white;
        }
        .otp-input:focus { outline: none; border-color: #333; }
        
        .btn-primary { 
            display: block;
            width: 100%;
            padding: 14px; 
            background: #333; 
            color: white; 
            border: none;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-primary:hover { background: #444; }
        
        .resend-section {
            text-align: center;
            margin-top: 24px;
        }
        .resend-text { font-size: 13px; color: #666; margin-bottom: 8px; }
        .resend-link { font-size: 13px; color: #333; text-decoration: none; font-weight: 500; }
        .resend-link.disabled { color: #999; pointer-events: none; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #999;
            text-decoration: none;
        }
        
        .timer {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <a href="homepage.html" class="logo">ARNES DIVE</a>
            
            <h1 class="otp-title">Masukkan Kode</h1>
            <p class="otp-subtitle">Kode 6 digit telah dikirim ke <span>ahmad@email.com</span></p>
            
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" value="4">
                <input type="text" class="otp-input" maxlength="1" value="2">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
            </div>
            
            <a href="account.html" class="btn-primary" style="text-decoration: none;">Verifikasi</a>
            
            <div class="resend-section">
                <p class="resend-text">Tidak menerima kode?</p>
                <span class="timer">Kirim ulang dalam <strong>45</strong> detik</span>
                <!-- After timer expires:
                <a href="#" class="resend-link">Kirim ulang kode</a>
                -->
            </div>
            
            <a href="login.html" class="back-link">← Kembali ke login</a>
        </div>
    </div>

</body>
</html>
