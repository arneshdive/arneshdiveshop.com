<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands - Admin Arnes Dive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { brand: '#333333' } } } }</script>
</head>
<body class="font-sans text-sm bg-gray-100">
    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-brand text-white transform -translate-x-full lg:translate-x-0 z-30">
            <div class="p-6 border-b border-gray-700"><a href="index.html" class="text-xl font-bold">ARNES DIVE</a><p class="text-xs text-gray-400 mt-1">Admin Panel</p></div>
            <nav class="p-4 space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>📊</span> Dashboard</a>
                <a href="products.html" class="flex items-center gap-3 px-4 py-3 bg-gray-700 rounded font-medium"><span>📦</span> Products</a>
                <a href="orders.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🛒</span> Orders</a>
                <div class="pt-4 border-t border-gray-700 mt-4"><a href="settings.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>⚙️</span> Settings</a><a href="../login.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-700 rounded text-gray-300"><span>🚪</span> Logout</a></div>
            </nav>
        </aside>
        <div class="flex-1 lg:ml-64">
            <header class="bg-white border-b px-4 py-3 flex items-center justify-between">
                <button class="lg:hidden text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')">☰</button>
                <h1 class="text-lg font-semibold">Brands</h1>
                <button class="bg-brand text-white px-4 py-2 text-xs">+ Add Brand</button>
            </header>
            <main class="p-6">
                <div class="bg-white border">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 text-xs uppercase text-gray-600">
                            <tr><th class="text-left p-4">Brand</th><th class="text-left p-4">Products</th><th class="text-left p-4">Status</th><th class="text-right p-4">Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr class="border-t hover:bg-gray-50"><td class="p-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-100 border flex items-center justify-center text-gray-400 text-xs">Logo</div><span class="font-medium">Mares</span></div></td><td class="p-4">28 products</td><td class="p-4"><span class="text-green-600">Active</span></td><td class="p-4 text-right"><button class="text-brand text-xs mr-2">Edit</button><button class="text-red-500 text-xs">Delete</button></td></tr>
                            <tr class="border-t hover:bg-gray-50"><td class="p-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-100 border flex items-center justify-center text-gray-400 text-xs">Logo</div><span class="font-medium">Cressi</span></div></td><td class="p-4">22 products</td><td class="p-4"><span class="text-green-600">Active</span></td><td class="p-4 text-right"><button class="text-brand text-xs mr-2">Edit</button><button class="text-red-500 text-xs">Delete</button></td></tr>
                            <tr class="border-t hover:bg-gray-50"><td class="p-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-100 border flex items-center justify-center text-gray-400 text-xs">Logo</div><span class="font-medium">Beuchat</span></div></td><td class="p-4">15 products</td><td class="p-4"><span class="text-green-600">Active</span></td><td class="p-4 text-right"><button class="text-brand text-xs mr-2">Edit</button><button class="text-red-500 text-xs">Delete</button></td></tr>
                            <tr class="border-t hover:bg-gray-50"><td class="p-4"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gray-100 border flex items-center justify-center text-gray-400 text-xs">Logo</div><span class="font-medium">Salvimar</span></div></td><td class="p-4">18 products</td><td class="p-4"><span class="text-green-600">Active</span></td><td class="p-4 text-right"><button class="text-brand text-xs mr-2">Edit</button><button class="text-red-500 text-xs">Delete</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
